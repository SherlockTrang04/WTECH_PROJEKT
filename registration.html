<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">\
    <link rel="stylesheet" href="./styles/style.css">
    <title>Regitrácia</title>
</head>
<body>
    <div class="img-registration">
        <img src="./assets/reg_img.jpg" alt="registration image">
    </div>
    <div class="registration-container">
        <h1>Registrácia</h1>
        <form action="/register" method="post">
            <label for="username">Meno a priezvisko:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="username">Používateľské meno:</label>
            <input type="text" id="username" name="username" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="phone">Telefón:</label>
            <input type="tel" id="phone" name="phone"><br><br>

            <label for="address_street">Ulica:</label>
            <input type="text" id="address_street" name="address_street"><br><br>

            <label for="address_house_number">Číslo domu:</label>
            <input type="text" id="address_house_number" name="address_house_number"><br><br>

            <label for="address_zip">PSČ:</label>
            <input type="text" id="address_zip" name="address_zip"><br><br>

            <label for="address_city">Mesto:</label>
            <input type="text" id="address_city" name="address_city"><br><br>

            <label for="password">Heslo:</label>
            <input type="password" id="password" name="password" required><br><br>

            <button type="submit">Registrovať sa</button>
            <a href="./login.html" class="back-link">Už máte účet? Prihláste sa</a>
            </a>
        </form>
    </div>
</body>
</html>
