<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <title>Admin – Prihlásenie</title>
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .btn-primary { background: #2c3e50; border: none; padding: 12px; }
        .btn-primary:hover { background: #34495e; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="./assets/logo.png" alt="logo" style="max-width: 150px; margin-bottom: 30px;">
        <h4 class="mb-4">Administrácia</h4>
        <form onsubmit="event.preventDefault(); window.location.href='admin.html';">
            <div class="mb-3 text-start">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="admin@elektroshop.sk" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label">Heslo</label>
                <input type="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Prihlásiť sa</button>
        </form>
    </div>
</body>
</html>
